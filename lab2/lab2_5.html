<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма</title>
</head>
<body>
    <h1>Форма регистрации пользователя</h1>

    <form method="post">
        <table>
            <tr>
                <td><label for="email">E-mail</label></td>
                <td><input type="email" id="email" name="email" placeholder="Введите e-mail" required></td>
            </tr>
            <tr>
                <td><label for="password">Пароль</label></td>
                <td><input type="password" id="password" name="password" placeholder="Введите пароль" required></td>
            </tr>
            <tr>
                <td>Пол</td>
                <td>
                    <label><input type="radio" name="gender" value="male" checked> Мужчина</label>
                    <label><input type="radio" name="gender" value="female"> Женщина</label>
                </td>
            </tr>
            <tr>
                <td><label for="year">Год рождения</label></td>
                <td>
                    <select id="year" name="year">
                        <option value="1981" selected>1981</option>
                        <option value="1982">1982</option>
                        <option value="1983">1983</option>
                        <option value="1984">1984</option>
                        <option value="1985">1985</option>
                        <option value="1986">1986</option>
                        <option value="1987">1987</option>
                        <option value="1988">1988</option>
                        <option value="1989">1989</option>
                        <option value="1990">1990</option>
                        <option value="1991">1991</option>
                        <option value="1992">1992</option>
                        <option value="1993">1993</option>
                        <option value="1994">1994</option>
                        <option value="1995">1995</option>
                        <option value="1996">1996</option>
                        <option value="1997">1997</option>
                        <option value="1998">1998</option>
                        <option value="1999">1999</option>
                        <option value="2000">2000</option>
                    </select>
                    -й
                </td>
            </tr>
            <tr>
                <td>Я знаю</td>
                <td>
                    <label><input type="checkbox" name="lang" value="ru" checked disabled> Русский</label><br>
                    <label><input type="checkbox" name="lang" value="es"> Испанский</label><br>
                    <label><input type="checkbox" name="lang" value="de"> Немецкий</label><br>
                    <label><input type="checkbox" name="lang" value="en"> Английский</label><br>
                    <label><input type="checkbox" name="lang" value="zh"> Китайский</label>
                </td>
            </tr>
            <tr>
                <td><label for="about">Обо мне</label></td>
                <td><textarea id="about" name="about" rows="5" cols="40" placeholder="Напишите коротко о себе"></textarea></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Готово">
                    <input type="reset" value="Очистить">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
