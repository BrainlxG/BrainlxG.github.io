<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3: Iframe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .menu-frame {
            width: 200px;
            border-right: 1px solid #ccc;
        }
        .content-frame {
            flex-grow: 1;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Левый фрейм (меню) -->
    <div class="menu-frame">
        <iframe src="menu.html" name="menu"></iframe>
    </div>

    <!-- Правый фрейм (контент) -->
    <div class="content-frame">
        <iframe src="doc.html" name="content"></iframe>
    </div>
</body>
</html>
